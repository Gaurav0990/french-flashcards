.done .sub{font-size:14px;color:#888;margin:8px 0 20px}
.done button{padding:8px 20px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;margin:4px}

const MASTER_KEY='$2a$10$MLLXGtaFKvyfGGEHs2tAbusHawh2S0D2.xC.nsi3Jnu3Yb4e0jLRW';
const BIN_ID='69f750c3856a6821899f84ed';
const JAPI='https://api.jsonbin.io/v3/b/';
let _saveTimer=null;
function saveProgress(){
  try{
    const data={known:[...known],again:[...again],cur,dir:showFR};
    clearTimeout(_saveTimer);
    _saveTimer=setTimeout(async()=>{
      try{
        await fetch(JAPI+BIN_ID,{
          method:'PUT',
          headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
          body:JSON.stringify(data)
        });
        showSaved();
      }catch(e){}
    },1200);
  }catch(e){}
}
async function loadProgress(){
  try{
    const res=await Promise.race([
      fetch(JAPI+BIN_ID+'/latest',{headers:{'X-Master-Key':MASTER_KEY}}),
      new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),5000))
    ]);
    const json=await res.json();
    const d=json.record;
    if(d&&d.known) known=new Set(d.known);
    if(d&&d.again) again=new Set(d.again);
    if(d&&typeof d.cur==='number') cur=d.cur;
    if(d&&typeof d.dir==='boolean') showFR=d.dir;
  }catch(e){
    console.log('Progress load failed, starting fresh:',e);
  }
}
function confirmClear(){
  if(confirm('Clear all saved progress for this set?')){
    known=new Set();again=new Set();cur=0;showFR=true;
    saveProgress();
    build();
  }
}
let _savedTimer=null;
function showSaved(){
  const b=document.getElementById('saved-badge');
  if(b){b.style.display='inline';if(_savedTimer)clearTimeout(_savedTimer);_savedTimer=setTimeout(()=>{b.style.display='none';},2000);}
}
function updateReviewBtn(){
  const btn=document.getElementById('btn-review');
  if(btn){if(again.size>0){btn.style.display='inline';btn.textContent='Review practice ('+again.size+')';}else{btn.style.display='none';}}
}
function reviewAgainCards(){
  deck=ALL.filter(c=>again.has(ALL.indexOf(c)));
  cur=0;flipped=false;render();updateStats();
}

const ALL=[
{f:"il fait beau",e:"the weather is nice",ex:"Il fait beau aujourd'hui, allons au parc !",note:"il fait = use for general weather descriptions",topic:"weather",diff:"beginner"},
{f:"il fait chaud",e:"it's hot",ex:"En été, il fait très chaud en France.",note:"",topic:"weather",diff:"beginner"},
{f:"il fait froid",e:"it's cold",ex:"Il fait froid ce matin — mets ton manteau !",note:"",topic:"weather",diff:"beginner"},
{f:"il fait frais",e:"it's cool",ex:"Il fait frais ce soir, prends une veste.",note:"",topic:"weather",diff:"beginner"},
{f:"il fait mauvais",e:"the weather is bad",ex:"Il fait mauvais — je reste à la maison.",note:"",topic:"weather",diff:"beginner"},
{f:"il pleut",e:"it's raining",ex:"Il pleut, prends ton parapluie !",note:"from verb pleuvoir — irregular",topic:"weather",diff:"beginner"},
{f:"il neige",e:"it's snowing",ex:"Il neige beaucoup en janvier dans les Alpes.",note:"from verb neiger",topic:"weather",diff:"beginner"},
{f:"il gèle",e:"it's freezing",ex:"Il gèle cette nuit — les routes sont dangereuses.",note:"from verb geler",topic:"weather",diff:"intermediate"},
{f:"il y a du soleil",e:"it's sunny",ex:"Il y a du soleil et il fait chaud aujourd'hui.",note:"il y a = use for specific conditions",topic:"weather",diff:"beginner"},
{f:"il y a du vent",e:"it's windy",ex:"Il y a beaucoup de vent en automne.",note:"",topic:"weather",diff:"beginner"},
{f:"il y a des nuages",e:"it's cloudy",ex:"Ce matin, il y a des nuages dans le ciel.",note:"",topic:"weather",diff:"beginner"},
{f:"il y a de la pluie",e:"there is rain",ex:"Il y a de la pluie prévu pour demain.",note:"more formal than il pleut",topic:"weather",diff:"intermediate"},
{f:"il y a de l'orage",e:"there's a storm",ex:"Il y a de l'orage ce soir — restez à l'intérieur.",note:"",topic:"weather",diff:"intermediate"},
{f:"quel temps fait-il ?",e:"what's the weather like?",ex:"Quel temps fait-il aujourd'hui à Paris ?",note:"most common way to ask about weather",topic:"weather",diff:"beginner"},
{f:"comment est le temps ?",e:"how is the weather?",ex:"Comment est le temps à Chicago en hiver ?",note:"alternative way to ask",topic:"weather",diff:"beginner"},
{f:"le printemps",e:"spring",ex:"Au printemps, les fleurs poussent.",note:"en printemps → au printemps (exception)",topic:"seasons",diff:"beginner"},
{f:"l'été (m)",e:"summer",ex:"En été, il fait très chaud et il y a du soleil.",note:"en été",topic:"seasons",diff:"beginner"},
{f:"l'automne (m)",e:"autumn / fall",ex:"En automne, les feuilles tombent des arbres.",note:"en automne",topic:"seasons",diff:"beginner"},
{f:"l'hiver (m)",e:"winter",ex:"En hiver, il fait froid et il neige souvent.",note:"en hiver",topic:"seasons",diff:"beginner"},
{f:"en été / en hiver / en automne",e:"in summer / in winter / in autumn",ex:"En été il fait chaud. En hiver il fait froid.",note:"use en for all seasons EXCEPT printemps (au printemps)",topic:"seasons",diff:"intermediate"},
{f:"la température est de... degrés",e:"the temperature is ... degrees",ex:"La température est de vingt degrés aujourd'hui.",note:"",topic:"seasons",diff:"intermediate"},
{f:"il fait moins cinq",e:"it's minus five (degrees)",ex:"En hiver, il fait parfois moins cinq la nuit.",note:"",topic:"seasons",diff:"intermediate"},
{f:"il y a... (there is/are)",e:"used to say something exists / is present",ex:"Il y a un jardin derrière la maison. Il y a des nuages.",note:"il y a = there is / there are — very common!",topic:"expressions",diff:"beginner"},
{f:"il n'y a pas de...",e:"there is no... / there are no...",ex:"Il n'y a pas de jardin. Il n'y a pas de vent.",note:"negation of il y a — de replaces du/des/un/une",topic:"expressions",diff:"intermediate"},
{f:"c'est / ce sont",e:"it is / they are",ex:"C'est mon frère. Ce sont mes parents.",note:"c'est for singular, ce sont for plural",topic:"expressions",diff:"intermediate"},
{f:"j'habite dans...",e:"I live in...",ex:"J'habite dans une maison à la campagne.",note:"",topic:"expressions",diff:"beginner"},
{f:"ma pièce préférée est...",e:"my favourite room is...",ex:"Ma pièce préférée est ma chambre.",note:"",topic:"expressions",diff:"beginner"},
{f:"j'aime / je n'aime pas",e:"I like / I don't like",ex:"J'aime lire des livres. Je n'aime pas le froid.",note:"aimer + infinitive = like doing something",topic:"expressions",diff:"beginner"},
{f:"j'adore / je déteste",e:"I love / I hate",ex:"J'adore le chocolat ! Je déteste les examens.",note:"stronger than aimer / ne pas aimer",topic:"expressions",diff:"beginner"},
{f:"je préfère",e:"I prefer",ex:"Je préfère l'été au printemps.",note:"préférer: préfère/préfères/préfère/préférons...",topic:"expressions",diff:"intermediate"},
{f:"surtout le soir",e:"especially in the evening",ex:"C'est la pièce où nous regardons la télé, surtout le soir.",note:"surtout = especially / above all",topic:"expressions",diff:"intermediate"},
{f:"quand il fait beau",e:"when the weather is nice",ex:"Quand il fait beau, j'aime me promener.",note:"quand = when (conjunction)",topic:"expressions",diff:"intermediate"},
{f:"en été, nous faisons souvent...",e:"in summer, we often...",ex:"En été, nous faisons souvent des barbecues en famille.",note:"faire du/de la = to do/play a sport or activity",topic:"expressions",diff:"intermediate"},
{f:"est-ce que...?",e:"question form — adds no meaning, just makes a question",ex:"Est-ce que tu aimes le français ? Est-ce qu'il pleut ?",note:"Add est-ce que before any statement to form a question",topic:"questions",diff:"beginner"},
{f:"inversion question",e:"swap verb and subject to ask a question",ex:"Tu aimes le chocolat → Aimes-tu le chocolat ?",note:"more formal — common in writing",topic:"questions",diff:"intermediate"},
{f:"intonation question",e:"raise voice at end of statement",ex:"Tu parles français ? Il fait beau ?",note:"simplest question form — informal speech",topic:"questions",diff:"beginner"},
{f:"où habites-tu ?",e:"where do you live?",ex:"Où habites-tu ? — J'habite à Chicago.",note:"",topic:"questions",diff:"beginner"},
{f:"pourquoi apprends-tu le français ?",e:"why are you learning French?",ex:"Pourquoi apprends-tu le français ? — Parce que j'adore la culture française.",note:"answer with: parce que (because)",topic:"questions",diff:"intermediate"},
{f:"à quelle heure... ?",e:"at what time...?",ex:"À quelle heure commence le cours ? — À neuf heures.",note:"",topic:"questions",diff:"beginner"},
{f:"combien d'étages a la maison ?",e:"how many floors does the house have?",ex:"Combien d'étages a ta maison ? — Elle a deux étages.",note:"combien de = how many",topic:"questions",diff:"intermediate"},
{f:"qu'est-ce qu'il y a dans... ?",e:"what is there in...?",ex:"Qu'est-ce qu'il y a dans le salon ? — Il y a un canapé et une télévision.",note:"",topic:"questions",diff:"intermediate"},
{f:"je parle français à la maison",e:"I speak French at home",ex:"Je parle français à la maison avec ma famille.",note:"à la maison = at home",topic:"sentences",diff:"beginner"},
{f:"nous mangeons tous ensemble",e:"we all eat together",ex:"C'est là que nous mangeons tous ensemble.",note:"tous = all (masc.); toutes = all (fem.)",topic:"sentences",diff:"intermediate"},
{f:"c'est mon refuge / mon endroit préféré",e:"it's my refuge / my favourite place",ex:"Ma maison, c'est mon refuge, mon endroit préféré dans le monde.",note:"",topic:"sentences",diff:"intermediate"},
{f:"il y a beaucoup de souvenirs",e:"there are many memories",ex:"Cette maison est pleine de souvenirs.",note:"beaucoup de = a lot of (no article after)",topic:"sentences",diff:"intermediate"},
{f:"c'est plus qu'un simple bâtiment",e:"it's more than a simple building",ex:"Pour moi, c'est plus qu'un simple bâtiment.",note:"plus que = more than",topic:"sentences",diff:"advanced"},
];

let deck=[],cur=0,flipped=false,showFR=true,known=new Set(),again=new Set();
function build(){const t=document.getElementById('ftopic').value;deck=ALL.filter(c=>t==='all'||c.topic===t);cur=0;flipped=false;known.clear();again.clear();render();updateStats();}
function shuffle(){for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}cur=0;flipped=false;saveProgress();render();updateStats();}
function toggleDir(){showFR=!showFR;flipped=false;saveProgress();render();}
function updateStats(){updateReviewBtn();document.getElementById('st').textContent=deck.length;document.getElementById('sk').textContent=known.size;document.getElementById('sa').textContent=again.size;document.getElementById('sl').textContent=Math.max(0,deck.length-cur);const p=deck.length?Math.round((cur/deck.length)*100):0;document.getElementById('prog').style.width=p+'%';document.getElementById('ctr').textContent=deck.length?'Card '+(cur+1)+' of '+deck.length:'No cards';}
function render(){
  const a=document.getElementById('area');
  if(!deck.length){a.innerHTML='<p style="color:#888;padding:1rem 0">No cards.</p>';return;}
  if(cur>=deck.length){const k=known.size,ag=again.size;a.innerHTML=`<div class="done"><div class="big">${k}/${deck.length}</div><div class="sub">You knew ${k} — ${ag} to review.</div>${ag>0?`<button onclick="reviewAgain()">Review practice cards</button>`:''}&#32;<button onclick="build()">Restart</button></div>`;return;}
  const c=deck[cur];const front=showFR?c.f:c.e;const back=showFR?c.e:c.f;const d=c.diff||'intermediate';
  a.innerHTML=`<div class="card-wrap"><div class="card" id="card" onclick="flip()">
    <div class="face front"><div><div class="badges"><span class="badge b-topic">${c.topic}</span><span class="badge b-${d}">${d}</span></div><div class="card-word">${front}</div><div class="card-hint">tap to reveal</div></div><div class="dir-toggle">${showFR?'FR → EN':'EN → FR'}</div></div>
    <div class="face back"><div><div class="badges"><span class="badge b-topic">${c.topic}</span></div><div class="card-trans">${back}</div>${c.note?`<div class="card-note">${c.note}</div>`:''}<div class="card-ex">${c.ex}</div></div></div>
  </div></div>
  <div class="mark-row" id="mr"><button class="btn-a" onclick="markA()">Practice again</button><button class="btn-k" onclick="markK()">Know it</button></div>
  <div class="nav-row"><button onclick="prev()">← Back</button><button onclick="next()">Next →</button></div>`;
  updateStats();
}
function flip(){flipped=!flipped;document.getElementById('card').classList.toggle('flipped',flipped);document.getElementById('mr').style.display=flipped?'flex':'none';}
function markK(){const idx=ALL.indexOf(deck[cur]);known.add(idx);again.delete(idx);saveProgress();next();}
function markA(){const idx=ALL.indexOf(deck[cur]);again.add(idx);known.delete(idx);saveProgress();next();}
function next(){flipped=false;cur=Math.min(cur+1,deck.length);saveProgress();render();}
function prev(){flipped=false;cur=Math.max(cur-1,0);saveProgress();render();}
function reviewAgain(){const idx=[...again];deck=deck.filter((_,i)=>idx.includes(i));cur=0;flipped=false;known.clear();again.clear();render();updateStats();}
document.getElementById('ftopic').addEventListener('change',()=>{known=new Set();again=new Set();cur=0;saveProgress();build();});
loadProgress().then(()=>build());
</script>
